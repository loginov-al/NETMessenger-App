# NETMessenger Web — web.netmessenger.su
# SSL: Timeweb Cloud (на CDN). VPS слушает порт 80.

upstream netmessenger_web {
    server 127.0.0.1:8000 fail_timeout=0;
}

map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      https;
}

server {
    listen 80;
    listen [::]:80;
    server_name web.netmessenger.su 185.200.241.9;

    root /var/www/netmessenger-web;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 25m;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    location /static/ {
        alias /var/www/netmessenger-web/static/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    location = /sw.js {
        proxy_pass         http://netmessenger_web;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $forwarded_proto;
        add_header         Cache-Control "no-cache";
        add_header         Service-Worker-Allowed "/";
    }

    location / {
        proxy_pass         http://netmessenger_web;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $forwarded_proto;
        proxy_read_timeout 60s;
        add_header         Cache-Control "no-cache, must-revalidate";
    }

    access_log /var/log/nginx/web.netmessenger.su.access.log;
    error_log  /var/log/nginx/web.netmessenger.su.error.log;
}
