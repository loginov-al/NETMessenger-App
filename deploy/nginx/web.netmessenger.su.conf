# NETMessenger Web — web.netmessenger.su
#
# Установка:
#   sudo cp deploy/nginx/web.netmessenger.su.conf /etc/nginx/sites-available/web.netmessenger.su
#   sudo ln -sf /etc/nginx/sites-available/web.netmessenger.su /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (первый раз):
#   sudo certbot --nginx -d web.netmessenger.su

upstream netmessenger_web {
    server 127.0.0.1:8000 fail_timeout=0;
}

# Редирект HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name web.netmessenger.su;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name web.netmessenger.su;

    # Путь к проекту на сервере
    root /var/www/netmessenger-web;

    # Let's Encrypt (после certbot)
    ssl_certificate     /etc/letsencrypt/live/web.netmessenger.su/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/web.netmessenger.su/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Безопасность
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 25m;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Статика — отдаёт nginx (кэш для CDN Timeweb)
    location /static/ {
        alias /var/www/netmessenger-web/static/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Service Worker — через приложение (нужны заголовки)
    location = /sw.js {
        proxy_pass         http://netmessenger_web;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header         Cache-Control "no-cache";
        add_header         Service-Worker-Allowed "/";
    }

    # HTML и API — Flask/Gunicorn
    location / {
        proxy_pass         http://netmessenger_web;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        add_header         Cache-Control "no-cache, must-revalidate";
    }

    access_log /var/log/nginx/web.netmessenger.su.access.log;
    error_log  /var/log/nginx/web.netmessenger.su.error.log;
}
